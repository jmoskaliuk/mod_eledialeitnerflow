<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- Flashcard box with stacked cards and checkmark -->
  <!-- Back card -->
  <rect x="4" y="1" width="16" height="13" rx="1.5" fill="#5d8ab4" opacity="0.35"/>
  <!-- Middle card -->
  <rect x="2.5" y="3" width="16" height="13" rx="1.5" fill="#5d8ab4" opacity="0.55"/>
  <!-- Front card -->
  <rect x="1" y="5" width="16" height="13" rx="1.5" fill="#5d8ab4" stroke="#3a6d99" stroke-width="0.6"/>
  <!-- Lines on card -->
  <line x1="3.5" y1="9" x2="14.5" y2="9" stroke="#fff" stroke-width="0.9" opacity="0.8"/>
  <line x1="3.5" y1="12" x2="12" y2="12" stroke="#fff" stroke-width="0.9" opacity="0.6"/>
  <line x1="3.5" y1="15" x2="10" y2="15" stroke="#fff" stroke-width="0.9" opacity="0.4"/>
  <!-- Checkmark circle (learned) -->
  <circle cx="18.5" cy="18.5" r="4.5" fill="#4caf50"/>
  <polyline points="16,18.5 17.8,20.3 21,17" fill="none" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
