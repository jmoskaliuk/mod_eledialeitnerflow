<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Flashcard box with stacked cards and checkmark -->
  <!-- Back card -->
  <rect x="3" y="1" width="11" height="8" rx="1" fill="#5d8ab4" opacity="0.4"/>
  <!-- Middle card -->
  <rect x="2" y="2.5" width="11" height="8" rx="1" fill="#5d8ab4" opacity="0.6"/>
  <!-- Front card -->
  <rect x="1" y="4" width="11" height="8" rx="1" fill="#5d8ab4" stroke="#3a6d99" stroke-width="0.5"/>
  <!-- Lines on card -->
  <line x1="3" y1="6.5" x2="10" y2="6.5" stroke="#fff" stroke-width="0.7" opacity="0.8"/>
  <line x1="3" y1="8.5" x2="8" y2="8.5" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
  <!-- Checkmark circle (learned) -->
  <circle cx="12" cy="12" r="3.5" fill="#4caf50"/>
  <polyline points="10.2,12 11.4,13.2 13.8,10.8" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
